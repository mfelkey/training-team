[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -m "not integration"
markers =
    integration: end-to-end test that requires a working ChromaDB embedder (network/ONNX model available). Skipped by default; run with `pytest -m integration`.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
